apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-code
  namespace: enterprise-apps
data:
  main.py: |
    import os
    import psycopg2
    from flask import Flask, request, jsonify

    app = Flask(__name__)

    def get_db_connection():
        conn = psycopg2.connect(
            host='127.0.0.1',
            database='app_db',
            user='app_user',
            password='password123'
        )
        return conn

    @app.route('/users', methods=['GET', 'POST'])
    def handle_users():
        conn = get_db_connection()
        cur = conn.cursor()
        
        if request.method == 'POST':
            data = request.json
            cur.execute('INSERT INTO users (name, email) VALUES (%s, %s)',
                        (data['name'], data['email']))
            conn.commit()
            return jsonify({"status": "user added"}), 201
        
        cur.execute('SELECT name, email FROM users')
        users = [{"name": row[0], "email": row[1]} for row in cur.fetchall()]
        cur.close()
        conn.close()
        return jsonify(users)

    if __name__ == '__main__':
        # Create table on start
        conn = get_db_connection()
        cur = conn.cursor()
        cur.execute('CREATE TABLE IF NOT EXISTS users (id SERIAL PRIMARY KEY, name VARCHAR(100), email VARCHAR(100))')
        conn.commit()
        cur.close()
        conn.close()
        app.run(host='0.0.0.0', port=8080)

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
  namespace: enterprise-apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>GKE Fintech Platform</title></head>
    <body style="font-family: sans-serif; padding: 20px;">
        <h1>User Management Portal</h1>
        <div style="margin-bottom: 20px;">
            <input id="name" placeholder="Name">
            <input id="email" placeholder="Email">
            <button onclick="addUser()">Add User</button>
        </div>
        <ul id="userList"></ul>
        <script>
            async function loadUsers() {
                const res = await fetch('/api/users');
                const users = await res.json();
                const list = document.getElementById('userList');
                list.innerHTML = '';
                users.forEach(u => {
                    const li = document.createElement('li');
                    li.textContent = `${u.name} (${u.email})`;
                    list.appendChild(li);
                });
            }
            async function addUser() {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                await fetch('/api/users', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email})
                });
                loadUsers();
            }
            loadUsers();
        </script>
    </body>
    </html>
  nginx.conf: |
    server {
        listen 8080;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            proxy_pass http://user-service/;
        }
    }
