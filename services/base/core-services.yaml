apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: enterprise-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: frontend
        image: nginx:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsUser: 101
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: enterprise-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: product
        image: python:3.11-slim
        command: ["python", "-c", "import time; print('Product Service Running...'); [time.sleep(10) for _ in range(1000)]"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsUser: 1000
        ports:
        - containerPort: 8080
