{{- if .Values.shoppingAssistantService.create }}
{{- if .Values.serviceAccounts.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.shoppingAssistantService.name }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.serviceAccounts.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.shoppingAssistantService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.shoppingAssistantService.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.shoppingAssistantService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.shoppingAssistantService.name }}
    spec:
      {{- if .Values.serviceAccounts.create }}
      serviceAccountName: {{ .Values.shoppingAssistantService.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}
      terminationGracePeriodSeconds: 5
      {{- if .Values.securityContext.enable }}
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        {{- if .Values.seccompProfile.enable }}
        seccompProfile:
          type: {{ .Values.seccompProfile.type }}
        {{- end }}
      {{- end }}
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: false
        image: {{ .Values.images.repository }}/{{ .Values.shoppingAssistantService.name }}:{{ .Values.images.tag | default .Chart.AppVersion }}
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: GOOGLE_API_KEY
          value: {{ .Values.shoppingAssistantService.googleApiKey | default "" }}
        - name: ALLOYDB_CLUSTER_NAME
          value: {{ .Values.shoppingAssistantService.alloydbClusterName | default "" }}
        - name: ALLOYDB_INSTANCE_NAME
          value: {{ .Values.shoppingAssistantService.alloydbInstanceName | default "" }}
        - name: ALLOYDB_DATABASE_NAME
          value: {{ .Values.shoppingAssistantService.alloydbDatabaseName | default "" }}
        - name: ALLOYDB_TABLE_NAME
          value: {{ .Values.shoppingAssistantService.alloydbTableName | default "" }}
        - name: ALLOYDB_SECRET_NAME
          value: {{ .Values.shoppingAssistantService.alloydbSecretName | default "" }}
        - name: PROJECT_ID
          value: {{ .Values.shoppingAssistantService.projectId | default "" }}
        - name: REGION
          value: {{ .Values.shoppingAssistantService.region | default "" }}
        resources:
          {{- toYaml .Values.shoppingAssistantService.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.shoppingAssistantService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.shoppingAssistantService.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.shoppingAssistantService.name }}
  ports:
  - name: http
    port: 80
    targetPort: 8080
{{- end }}
