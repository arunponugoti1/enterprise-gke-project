apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arunponugoti1/enterprise-gke-project.git
    targetRevision: HEAD
    path: gke-project/services/base
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
